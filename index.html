<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Futurista</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

/* BODY */
body{
    height:100vh;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    display:flex;
    justify-content:center;
    align-items:center;
}

/* CONTENEDOR */
.container{
    width:100%;
    max-width:1000px;
    height:600px;
    perspective:1200px;
}

/* TARJETA */
.flip-card{
    width:100%;
    height:100%;
}

.flip-inner{
    width:100%;
    height:100%;
    position:relative;
    transform-style:preserve-3d;
    transition:0.8s;
}

/* EFECTO GIRO */
.container.flip .flip-inner{
    transform: rotateY(180deg);
}

/* CARAS */
.flip-front, .flip-back{
    position:absolute;
    width:100%;
    height:100%;
    backface-visibility:hidden;
    display:flex;
    border-radius:20px;
    overflow:hidden;
}

/* FRENTE */
.flip-front{
    background:#0f172a;
    color:white;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:40px;
}

/* ATRÁS */
.flip-back{
    transform: rotateY(180deg);
    background:white;
}

/* BOTÓN */
button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

/* INFO BTN */
.info-btn{
    background:#3b82f6;
    color:white;
    margin-bottom:20px;
}

/* FORMULARIOS */
.right{
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}

.form{
    width:80%;
}

.form h2{
    margin-bottom:10px;
}

.form input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
}

.btn-login{
    width:100%;
    background:#3b82f6;
    color:white;
}

/* LINKS */
.toggle{
    margin-top:10px;
    cursor:pointer;
    color:#3b82f6;
}

/* MODAL */
.modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal.active{
    display:flex;
}

.modal-content{
    background:white;
    padding:20px;
    border-radius:15px;
    width:300px;
}

</style>
</head>

<body>

<div class="container" id="container">
    <div class="flip-card">
        <div class="flip-inner">

            <!-- FRONT -->
            <div class="flip-front">

                <h1>¡Bienvenido!</h1>
                <p>Accede a tu cuenta o regístrate para comenzar</p>

                <button class="info-btn" onclick="openModal()">
                    <i class="fas fa-info-circle"></i> Información
                </button>

                <button onclick="flipCard()">
                    Ir a Login
                </button>

            </div>

            <!-- BACK -->
            <div class="flip-back">
                <div class="right">

                    <!-- LOGIN -->
                    <div class="form" id="loginForm">
                        <h2>Iniciar Sesión</h2>

                        <input type="email" placeholder="Email">
                        <input type="password" placeholder="Contraseña">

                        <button class="btn-login">Entrar</button>

                        <div class="toggle" onclick="showRegister()">
                            Crear cuenta
                        </div>
                    </div>

                    <!-- REGISTER -->
                    <div class="form" id="registerForm" style="display:none;">
                        <h2>Registro</h2>

                        <input type="text" placeholder="Nombre">
                        <input type="email" placeholder="Email">
                        <input type="password" placeholder="Contraseña">

                        <button class="btn-login">Registrarse</button>

                        <div class="toggle" onclick="showLogin()">
                            Ya tengo cuenta
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <h3>Información</h3>
        <p>Plataforma de cursos virtuales.</p>
        <button onclick="closeModal()">Cerrar</button>
    </div>
</div>

<script>

/* GIRAR TARJETA */
function flipCard(){
    document.getElementById('container').classList.add('flip');
}

/* VOLVER */
function showLogin(){
    document.getElementById('loginForm').style.display='block';
    document.getElementById('registerForm').style.display='none';
}

/* REGISTRO */
function showRegister(){
    document.getElementById('loginForm').style.display='none';
    document.getElementById('registerForm').style.display='block';
}

/* MODAL */
function openModal(){
    document.getElementById('modal').classList.add('active');
}

function closeModal(){
    document.getElementById('modal').classList.remove('active');
}

</script>

</body>
                                              </html>
